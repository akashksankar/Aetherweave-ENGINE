# ── AetherWeave Docker Compose ─────────────────────────────────────────────
# Orchestrates the 7-service sentient architecture stack.
# Includes persistence for Postgres, Redis, and Neo4j.

services:
  # ── PostgreSQL Database ─────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-aetherweave}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Cache + Pub/Sub + Celery Broker) ─────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Neo4j (Graph Analytics) ─────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    restart: always
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/password123}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    volumes:
      - neo4jdata:/data
      - neo4jlogs:/logs

  # ── FastAPI Backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-aetherweave}
      REDIS_URL: redis://redis:6379/0
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password123}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Celery Worker (Evolution & Analytics) ───────────────────────────────
  worker:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    command: celery -A apps.backend.worker.celery_app worker --loglevel=info
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-aetherweave}
      REDIS_URL: redis://redis:6379/0
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password123}
    depends_on:
      - db
      - redis

  # ── Celery Beat (Periodic Tasks) ────────────────────────────────────────
  beat:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    command: celery -A apps.backend.worker.beat_schedule beat --loglevel=info
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-aetherweave}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  # ── Next.js Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  neo4jdata:
  neo4jlogs:
